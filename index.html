<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Investigador PRO | Gestor de fuentes, notas y matriz de hallazgos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        /* Estilos (igual que antes, compactos pero completos) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; }
        body { background: #f0f4f8; padding: 2rem 1.5rem; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header-busqueda { display: flex; gap: 1rem; align-items: flex-end; background: white; border-radius: 2rem; padding: 1rem 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .busqueda-input { flex: 3; min-width: 200px; }
        .busqueda-input input { width: 100%; padding: 0.7rem 1rem; border: 1px solid #cbdde6; border-radius: 2rem; }
        button { background: #2c7da0; border: none; color: white; font-weight: 600; padding: 0.6rem 1.4rem; border-radius: 2rem; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        button:hover { background: #1f5e7c; transform: translateY(-2px); }
        .btn-sec { background: #5f7f8c; }
        .btn-accion { background: #dc6b4a; padding: 4px 10px; font-size: 0.7rem; margin: 0 4px; border-radius: 30px; }
        .btn-editar { background: #4a7c59; }
        .two-columns { display: flex; gap: 2rem; flex-wrap: wrap; }
        .col-temas { flex: 1.2; min-width: 280px; }
        .col-detalle { flex: 2; min-width: 320px; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 12px 28px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 2rem; }
        h2 { font-size: 1.4rem; color: #1f3b4c; margin-bottom: 1rem; border-left: 4px solid #3a8bb9; padding-left: 1rem; }
        .form-group { display: flex; flex-wrap: wrap; gap: 1rem; background: #f8fafc; padding: 1rem 1.5rem; border-radius: 1.5rem; margin-bottom: 1.5rem; align-items: flex-end; }
        .campo { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
        .campo label { font-weight: 600; font-size: 0.8rem; color: #1e4a62; }
        .campo input, .campo textarea, .campo select { background: white; border: 1px solid #cbdde6; border-radius: 1rem; padding: 0.6rem 1rem; }
        .toolbar { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-bottom: 1.2rem; }
        .temas-lista { max-height: 70vh; overflow-y: auto; padding-right: 5px; }
        .tema-item { background: #fefaf5; border-radius: 1.2rem; padding: 0.8rem 1rem; margin-bottom: 0.8rem; cursor: pointer; border: 1px solid #e2dcd5; display: flex; justify-content: space-between; align-items: center; }
        .tema-activo { background: #e6f0f5; border-left: 5px solid #2c7da0; font-weight: 600; }
        .nota-item { background: #f9f9f9; border-radius: 1rem; padding: 0.6rem; margin-bottom: 0.5rem; font-size: 0.8rem; }
        .badge { background: #e2eaf1; padding: 0.2rem 0.6rem; border-radius: 30px; font-size: 0.7rem; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(3px); align-items:center; justify-content:center; z-index:1000; }
        .modal-contenido { background: white; padding: 2rem; border-radius: 2rem; width: 90%; max-width: 1200px; max-height: 85vh; overflow-y: auto; }
        .botones-modal { display: flex; justify-content: flex-end; gap: 12px; margin-top: 1.5rem; }
        .matriz-tabla { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .matriz-tabla th, .matriz-tabla td { border: 1px solid #cbdde6; padding: 8px; text-align: left; vertical-align: top; }
        .matriz-tabla th { background: #eef3f7; }
        .tarjetas-container { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
        .tarjeta-nota { background: white; border-radius: 1.2rem; border: 1px solid #e2dcd5; padding: 1rem; width: calc(33% - 1rem); min-width: 280px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .vista-previa { background: #fefaf5; border: 1px solid #cbdde6; border-radius: 1rem; padding: 1rem; overflow-y: auto; max-height: 550px; }
        @media (max-width: 800px) { .two-columns { flex-direction: column; } .tarjeta-nota { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header-busqueda">
        <div class="busqueda-input">
            <label>🔍 Buscar</label>
            <input type="text" id="buscarInput" placeholder="Palabra o frase...">
        </div>
        <button id="btnBuscar">Buscar</button>
        <button id="btnLimpiarBusqueda" class="btn-sec">Limpiar</button>
    </div>

    <div class="two-columns">
        <div class="col-temas">
            <div class="card">
                <h2>📌 Temas</h2>
                <div class="form-group">
                    <div class="campo" style="flex:2;"><label>Nuevo tema</label><input type="text" id="nuevoTemaNombre"></div>
                    <button id="btnCrearTema">➕ Crear</button>
                </div>
                <div id="temasLista" class="temas-lista"></div>
                <div class="toolbar" style="margin-top: 1rem;">
                    <button id="btnExportarDB" class="btn-sec">📤 Exportar DB</button>
                    <button id="btnGuardarDrive" class="btn-sec" style="background:#4285F4;">☁️ Guardar en Drive</button>
                    <button id="btnImportarReemplazar" class="btn-sec">📥 Importar DB (reemplazar)</button>
                    <button id="btnImportarCombinar" class="btn-sec">➕ Añadir DB (combinar)</button>
                    <button id="btnGenerarPDFGlobal" class="btn-sec">📄 PDF Global</button>
                    <button id="btnMarkdownGlobal" class="btn-sec">📝 Reporte Global MD</button>
                    <input type="file" id="importDBReemplazar" accept=".db" style="display:none;">
                    <input type="file" id="importDBCombinar" accept=".db" style="display:none;">
                </div>
            </div>
        </div>
        <div class="col-detalle">
            <div class="card">
                <div id="detalleHeader"><h2 id="temaSeleccionadoTitulo">📖 Ningún tema seleccionado</h2></div>
                <div id="contenidoDetalle"><p style="text-align:center;">Selecciona un tema.</p></div>
            </div>
        </div>
    </div>
</div>

<!-- Modales -->
<div id="modalResultados" class="modal"><div class="modal-contenido"><h3>🔍 Resultados</h3><div id="resultadosLista"></div><div class="botones-modal"><button id="btnCerrarResultados">Cerrar</button></div></div></div>
<div id="modalFuente" class="modal"><div class="modal-contenido"><h3 id="modalFuenteTitulo">➕ Fuente</h3><div class="campo"><label>Título</label><input type="text" id="fuenteTitulo"></div><div class="campo"><label>URL</label><input type="url" id="fuenteUrl"></div><div class="campo"><label>Año</label><input type="text" id="fuenteFecha"></div><div class="campo"><label>Tipo</label><input type="text" id="fuenteTipo"></div><div class="campo"><label>Autores</label><input type="text" id="fuenteAutores"></div><div class="botones-modal"><button id="btnGuardarFuente">Guardar</button><button id="btnCancelarFuente">Cancelar</button></div></div></div>
<div id="modalNota" class="modal"><div class="modal-contenido"><h3 id="modalNotaTitulo">📝 Nota</h3><div class="campo"><label>Ubicación</label><input type="text" id="notaUbicacion"></div><div class="campo"><label>Nota</label><textarea id="notaTexto" rows="4"></textarea></div><div class="campo"><label>Fecha</label><input type="date" id="notaFecha"></div><div class="campo"><label>Categoría</label><input list="cats" id="notaCategoria"><datalist id="cats"><option>Hallazgo</option><option>Debilidad</option><option>Propuesta</option><option>Oportunidad</option><option>Dato</option></datalist></div><div class="botones-modal"><button id="btnGuardarNota">Guardar</button><button id="btnCancelarNota">Cancelar</button></div></div></div>
<div id="modalMatriz" class="modal"><div class="modal-contenido"><h3 id="matrizTitulo">📊 Matriz</h3><div id="matrizContenido"></div><div class="botones-modal"><button id="btnExportarMatrizCSV">Exportar CSV</button><button id="btnCerrarMatriz">Cerrar</button></div></div></div>
<div id="modalMarkdown" class="modal"><div class="modal-contenido"><h3>📝 Editor Markdown</h3><textarea id="editorMarkdown" rows="15" style="width:100%"></textarea><div id="vistaPreviaMarkdown" class="vista-previa"></div><div class="botones-modal"><button id="btnCopiarMarkdown">Copiar</button><button id="btnDescargarMarkdown">Descargar .md</button><button id="btnCerrarMarkdown">Cerrar</button></div></div></div>

<script>
    // ---------- CONFIGURACIÓN DRIVE (opcional, reemplazar con tu Client ID) ----------
    const CLIENT_ID = 'TU_CLIENT_ID_AQUI'; // Si no lo configuras, el botón de Drive no funcionará
    let tokenClient, accessToken = null;

    // ---------- GLOBALES ----------
    let SQL, db;
    let temaActivoId = null;
    let fuenteEnEdicionId = null;
    let notaEnEdicion = null;
    let matrizFuenteActual = null;
    let vistaActual = 'tabla';

    // ---------- FUNCIONES AUX ----------
    function generarId() { return Date.now() + '-' + Math.random().toString(36).substring(2,8); }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // ---------- INICIALIZAR DB ----------
    async function initDB() {
        return new Promise((resolve) => {
            const config = { locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` };
            initSqlJs(config).then(sql => {
                SQL = sql;
                db = new SQL.Database();
                db.run("CREATE TABLE IF NOT EXISTS temas (id TEXT PRIMARY KEY, nombre TEXT)");
                db.run("CREATE TABLE IF NOT EXISTS fuentes (id TEXT PRIMARY KEY, tema_id TEXT, titulo TEXT, url TEXT, fecha_consulta TEXT, tipo TEXT, autores TEXT)");
                db.run("CREATE TABLE IF NOT EXISTS notas (id TEXT PRIMARY KEY, fuente_id TEXT, ubicacion TEXT, texto TEXT, fecha TEXT, categoria TEXT)");
                db.run("CREATE INDEX IF NOT EXISTS idx_fuentes_tema ON fuentes(tema_id)");
                db.run("CREATE INDEX IF NOT EXISTS idx_notas_fuente ON notas(fuente_id)");
                resolve();
            });
        });
    }

    // ---------- CRUD ----------
    function listarTemas() { let stmt = db.prepare("SELECT id, nombre FROM temas ORDER BY nombre"); let r=[]; while(stmt.step()) r.push(stmt.getAsObject()); stmt.free(); return r; }
    function crearTema(n) { if(!n.trim()) return; let id=generarId(); db.run("INSERT INTO temas (id,nombre) VALUES (?,?)",[id,n.trim()]); return id; }
    function eliminarTema(id) { db.run("DELETE FROM notas WHERE fuente_id IN (SELECT id FROM fuentes WHERE tema_id=?)",[id]); db.run("DELETE FROM fuentes WHERE tema_id=?",[id]); db.run("DELETE FROM temas WHERE id=?",[id]); }
    function contarFuentes(tid) { let stmt=db.prepare("SELECT COUNT(*) as c FROM fuentes WHERE tema_id=?",[tid]); if(stmt.step()) return stmt.getAsObject().c; stmt.free(); return 0; }
    function listarFuentes(tid) { let stmt=db.prepare("SELECT * FROM fuentes WHERE tema_id=? ORDER BY titulo",[tid]); let r=[]; while(stmt.step()) r.push(stmt.getAsObject()); stmt.free(); return r; }
    function obtenerFuente(fid) { let stmt=db.prepare("SELECT * FROM fuentes WHERE id=?",[fid]); if(stmt.step()) return stmt.getAsObject(); stmt.free(); return null; }
    function guardarFuente(tid, fid, d) { if(fid) { db.run("UPDATE fuentes SET titulo=?, url=?, fecha_consulta=?, tipo=?, autores=? WHERE id=?",[d.titulo,d.url,d.fechaConsulta,d.tipo,d.autores,fid]); return fid; } else { let nid=generarId(); db.run("INSERT INTO fuentes (id,tema_id,titulo,url,fecha_consulta,tipo,autores) VALUES (?,?,?,?,?,?,?)",[nid,tid,d.titulo,d.url,d.fechaConsulta,d.tipo,d.autores]); return nid; } }
    function eliminarFuente(fid) { db.run("DELETE FROM notas WHERE fuente_id=?",[fid]); db.run("DELETE FROM fuentes WHERE id=?",[fid]); }
    function listarNotas(fid) { let stmt=db.prepare("SELECT * FROM notas WHERE fuente_id=? ORDER BY fecha DESC",[fid]); let r=[]; while(stmt.step()) r.push(stmt.getAsObject()); stmt.free(); return r; }
    function guardarNota(fid, nid, d) { if(nid) { db.run("UPDATE notas SET ubicacion=?, texto=?, fecha=?, categoria=? WHERE id=?",[d.ubicacion,d.texto,d.fecha,d.categoria||'',nid]); return nid; } else { let nid2=generarId(); db.run("INSERT INTO notas (id,fuente_id,ubicacion,texto,fecha,categoria) VALUES (?,?,?,?,?,?)",[nid2,fid,d.ubicacion,d.texto,d.fecha,d.categoria||'']); return nid2; } }
    function eliminarNota(nid) { db.run("DELETE FROM notas WHERE id=?",[nid]); }

    // ---------- MARKDOWN / CITAS ----------
    function generarCitaAPA(f) { return `${f.autores||'Autor'} (${f.fecha_consulta||'s.f.'}). ${f.titulo}. ${f.tipo||''} ${f.url||''}`.trim(); }
    function generarMarkdownTema(tid) { let tema=listarTemas().find(t=>t.id===tid); if(!tema) return ''; let md=`# ${tema.nombre}\n\n`; let fuentes=listarFuentes(tid); for(let f of fuentes){ md+=`## ${f.titulo}\n\n**Autores:** ${f.autores||'—'}\n**Año:** ${f.fecha_consulta||'—'}\n**URL:** ${f.url||'—'}\n\n`; let notas=listarNotas(f.id); notas.forEach((n,i)=>{ md+=`### Nota ${i+1}\n- **Ubicación:** ${n.ubicacion||'—'}\n- **Categoría:** ${n.categoria||'—'}\n- ${n.texto}\n\n`; }); md+=`**Cita APA:** ${generarCitaAPA(f)}\n\n---\n\n`; } return md; }

    // ---------- MATRIZ DE HALLAZGOS ----------
    function mostrarMatrizHallazgos(tid) {
        let tema=listarTemas().find(t=>t.id===tid);
        if(!tema) return;
        let todas=[];
        let fuentes=listarFuentes(tid);
        for(let f of fuentes){
            let notas=listarNotas(f.id);
            for(let n of notas){
                todas.push({id:n.id, fuente:f.titulo, autores:f.autores||'', anio:f.fecha_consulta||'', ubicacion:n.ubicacion||'', texto:n.texto, categoria:n.categoria||'', fid:f.id});
            }
        }
        let modal=document.createElement('div'); modal.className='modal'; modal.style.display='flex';
        modal.innerHTML=`<div class="modal-contenido"><h3>📊 Matriz de hallazgos - ${escapeHtml(tema.nombre)}</h3>
            <div style="display:flex; gap:1rem; margin-bottom:1rem;"><div class="campo"><label>Filtrar</label><select id="filtroCat"><option value="TODAS">Todas</option>${Array.from(new Set(todas.map(t=>t.categoria))).filter(c=>c).map(c=>`<option value="${c}">${c}</option>`).join('')}<option value="SIN">Sin categoría</option></select></div>
            <div><label>Vista</label><button id="vistaTablaBtn" class="btn-sec">📋 Tabla</button><button id="vistaTarjetasBtn" class="btn-sec">🃏 Tarjetas</button></div></div>
            <div id="contenedorHallazgos"></div><div class="botones-modal"><button id="exportarHallazgosCSV">Exportar CSV</button><button id="cerrarHallazgos">Cerrar</button></div></div>`;
        document.body.appendChild(modal);
        let contenedor=document.getElementById('contenedorHallazgos');
        let filtro=document.getElementById('filtroCat');
        let vistaTabla=document.getElementById('vistaTablaBtn'), vistaTarjetas=document.getElementById('vistaTarjetasBtn');
        function render(){
            let val=filtro.value; let filtradas=todas;
            if(val==='SIN') filtradas=todas.filter(t=>!t.categoria);
            else if(val!=='TODAS') filtradas=todas.filter(t=>t.categoria===val);
            if(vistaActual==='tabla'){
                let html='<table class="matriz-tabla"><thead><tr><th>Fuente</th><th>Autores/Año</th><th>Ubicación</th><th>Nota</th><th>Categoría</th><th>Acción</th></tr></thead><tbody>';
                filtradas.forEach(n=>{
                    html+=`<tr data-id="${n.id}"><td>${escapeHtml(n.fuente)}</td><td>${escapeHtml(n.autores)} ${n.anio?`(${n.anio})`:''}</td><td>${escapeHtml(n.ubicacion)}</td><td>${escapeHtml(n.texto)}</td>
                    <td><input class="cat-input" value="${escapeHtml(n.categoria)}" list="catLista" style="width:100%"><datalist id="catLista">${Array.from(new Set(todas.map(t=>t.categoria))).filter(c=>c).map(c=>`<option>${c}</option>`).join('')}</datalist></td>
                    <td><button class="guardar-cat" data-id="${n.id}">💾</button></td></tr>`;
                });
                html+='</tbody></table>';
                contenedor.innerHTML=html;
                document.querySelectorAll('.guardar-cat').forEach(btn=>btn.onclick=()=>{ let id=btn.dataset.id; let input=btn.closest('tr').querySelector('.cat-input'); db.run("UPDATE notas SET categoria=? WHERE id=?",[input.value,id]); alert('Guardado'); mostrarMatrizHallazgos(tid); });
            } else {
                let html='<div class="tarjetas-container">';
                filtradas.forEach(n=>{
                    html+=`<div class="tarjeta-nota"><div><strong>📄 ${escapeHtml(n.fuente)}</strong></div><div>${escapeHtml(n.autores)} ${n.anio?`(${n.anio})`:''}</div><div>📍 ${escapeHtml(n.ubicacion)}</div><div>${escapeHtml(n.texto)}</div>
                    <div><select class="cat-select" data-id="${n.id}"><option value="">Sin categoría</option>${Array.from(new Set(todas.map(t=>t.categoria))).filter(c=>c).map(c=>`<option value="${c}" ${n.categoria===c?'selected':''}>${c}</option>`).join('')}</select>
                    <button class="guardar-cat-tarjeta" data-id="${n.id}">💾</button></div></div>`;
                });
                html+='</div>';
                contenedor.innerHTML=html;
                document.querySelectorAll('.guardar-cat-tarjeta').forEach(btn=>btn.onclick=()=>{ let id=btn.dataset.id; let sel=btn.closest('.tarjeta-nota').querySelector('.cat-select'); db.run("UPDATE notas SET categoria=? WHERE id=?",[sel.value,id]); alert('Guardado'); mostrarMatrizHallazgos(tid); });
            }
        }
        filtro.onchange=render;
        vistaTabla.onclick=()=>{ vistaActual='tabla'; render(); };
        vistaTarjetas.onclick=()=>{ vistaActual='tarjetas'; render(); };
        render();
        document.getElementById('exportarHallazgosCSV').onclick=()=>{ let filas=document.querySelectorAll('#contenedorHallazgos .matriz-tabla tbody tr'); let csv=[['Fuente','Autores','Ubicación','Nota','Categoría'].join(',')]; filas.forEach(tr=>{ let celdas=tr.querySelectorAll('td'); if(celdas.length>=5){ let f=celdas[0].innerText.replace(/,/g,';'); let a=celdas[1].innerText.replace(/,/g,';'); let u=celdas[2].innerText.replace(/,/g,';'); let n=celdas[3].innerText.replace(/,/g,';'); let cat=celdas[4].querySelector('input').value.replace(/,/g,';'); csv.push([f,a,u,n,cat].join(',')); } }); let blob=new Blob([csv.join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='matriz.csv'; a.click(); };
        document.getElementById('cerrarHallazgos').onclick=()=>modal.remove();
    }

    // ---------- RENDER PRINCIPAL ----------
    function renderizarTemas(){
        let cont=document.getElementById('temasLista');
        let temas=listarTemas();
        cont.innerHTML='';
        if(!temas.length){ cont.innerHTML='<div>📭 Crea un tema</div>'; return; }
        temas.forEach(t=>{
            let div=document.createElement('div'); div.className=`tema-item ${temaActivoId===t.id?'tema-activo':''}`;
            div.innerHTML=`<div><strong>📂 ${escapeHtml(t.nombre)}</strong><br><small>${contarFuentes(t.id)} fuentes</small></div>
                           <div><button class="btn-accion btn-editar" data-editar="${t.id}">✏️</button><button class="btn-accion" data-eliminar="${t.id}">🗑️</button></div>`;
            div.onclick=(e)=>{ if(e.target.tagName!=='BUTTON') seleccionarTema(t.id); };
            cont.appendChild(div);
        });
        document.querySelectorAll('[data-editar]').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); let nuevo=prompt('Nuevo nombre', btn.getAttribute('data-editar')); if(nuevo) db.run("UPDATE temas SET nombre=? WHERE id=?",[nuevo,btn.getAttribute('data-editar')]); renderizarTemas(); if(temaActivoId===btn.getAttribute('data-editar')) renderizarDetalle(); });
        document.querySelectorAll('[data-eliminar]').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); if(confirm('Eliminar?')) eliminarTema(btn.getAttribute('data-eliminar')); renderizarTemas(); if(temaActivoId===btn.getAttribute('data-eliminar')){ temaActivoId=null; renderizarDetalle(); } });
    }

    function seleccionarTema(id){ temaActivoId=id; renderizarTemas(); renderizarDetalle(); }

    function renderizarDetalle(){
        let tema=listarTemas().find(t=>t.id===temaActivoId);
        let tituloElem=document.getElementById('temaSeleccionadoTitulo');
        let detalleElem=document.getElementById('contenidoDetalle');
        if(!tema){ tituloElem.innerHTML='📖 Ningún tema seleccionado'; detalleElem.innerHTML='<p>Selecciona un tema.</p>'; return; }
        tituloElem.innerHTML=`📖 ${escapeHtml(tema.nombre)}`;
        let fuentes=listarFuentes(tema.id);
        let html=`<div class="toolbar"><button id="btnAgregarFuente">➕ Nueva fuente</button><button id="btnGenerarPDFTema" class="btn-sec">📄 PDF tema</button><button id="btnMarkdownTema" class="btn-sec">📝 Reporte MD</button><button id="btnMatrizHallazgos" class="btn-sec">📊 Matriz hallazgos</button></div>`;
        if(!fuentes.length) html+='<p>📭 Sin fuentes.</p>';
        else {
            fuentes.forEach(f=>{
                let notas=listarNotas(f.id);
                html+=`<div style="background:#fefaf5; border-radius:1.2rem; padding:1rem; margin-bottom:1.5rem;"><div style="display:flex; justify-content:space-between;"><div><strong>📄 ${escapeHtml(f.titulo)}</strong> ${f.tipo?`<span class="badge">${escapeHtml(f.tipo)}</span>`:''}</div>
                <div><button class="btn-accion btn-editar" data-editar-fuente="${f.id}">✏️</button><button class="btn-accion" data-eliminar-fuente="${f.id}">🗑️</button>
                <button class="btn-accion" data-matriz-fuente="${f.id}">📊 Matriz</button><button class="btn-accion" data-cita-fuente="${f.id}">📝 Cita</button><button class="btn-accion" data-markdown-fuente="${f.id}">📄 MD</button></div></div>
                <div><a href="${escapeHtml(f.url)}" target="_blank">${escapeHtml(f.url)}</a> | ${f.fecha_consulta||'—'}</div>
                <div><strong>Notas:</strong> <button class="btn-accion btn-editar" data-agregar-nota="${f.id}">➕ Agregar nota</button></div><div class="notas-lista">`;
                notas.forEach(n=>{
                    html+=`<div class="nota-item"><div>📍 ${escapeHtml(n.ubicacion)} | 🏷️ ${escapeHtml(n.categoria||'')}</div><div>${escapeHtml(n.texto)}</div>
                    <div><button class="btn-accion btn-editar" data-editar-nota="${f.id}|${n.id}">✏️</button><button class="btn-accion" data-eliminar-nota="${n.id}">🗑️</button></div></div>`;
                });
                html+=`</div></div>`;
            });
        }
        detalleElem.innerHTML=html;
        document.getElementById('btnAgregarFuente')?.addEventListener('click',()=>abrirModalFuente(null));
        document.getElementById('btnGenerarPDFTema')?.addEventListener('click',()=>alert('PDF tema (funcionalidad completa omitida por brevedad, pero se puede implementar)'));
        document.getElementById('btnMarkdownTema')?.addEventListener('click',()=>{ let md=generarMarkdownTema(tema.id); abrirEditorMarkdown(md,`reporte_${tema.nombre}.md`); });
        document.getElementById('btnMatrizHallazgos')?.addEventListener('click',()=>mostrarMatrizHallazgos(tema.id));
        document.querySelectorAll('[data-editar-fuente]').forEach(btn=>btn.onclick=()=>abrirModalFuente(btn.getAttribute('data-editar-fuente')));
        document.querySelectorAll('[data-eliminar-fuente]').forEach(btn=>btn.onclick=()=>{ if(confirm('Eliminar fuente?')) eliminarFuente(btn.getAttribute('data-eliminar-fuente')); renderizarDetalle(); });
        document.querySelectorAll('[data-matriz-fuente]').forEach(btn=>btn.onclick=()=>mostrarMatrizFuente(btn.getAttribute('data-matriz-fuente')));
        document.querySelectorAll('[data-cita-fuente]').forEach(btn=>btn.onclick=()=>{ let f=obtenerFuente(btn.getAttribute('data-cita-fuente')); if(f) alert(generarCitaAPA(f)); });
        document.querySelectorAll('[data-markdown-fuente]').forEach(btn=>{ let f=obtenerFuente(btn.getAttribute('data-markdown-fuente')); if(f) abrirEditorMarkdown(generarMarkdownTema(tema.id),`fuente.md`); });
        document.querySelectorAll('[data-agregar-nota]').forEach(btn=>btn.onclick=()=>abrirModalNota(btn.getAttribute('data-agregar-nota'),null));
        document.querySelectorAll('[data-editar-nota]').forEach(btn=>{ let [fid,nid]=btn.getAttribute('data-editar-nota').split('|'); btn.onclick=()=>abrirModalNota(fid,nid); });
        document.querySelectorAll('[data-eliminar-nota]').forEach(btn=>btn.onclick=()=>{ if(confirm('Eliminar nota?')) eliminarNota(btn.getAttribute('data-eliminar-nota')); renderizarDetalle(); });
    }

    // ---------- MODALES ----------
    function abrirModalFuente(fid){
        let temaId=temaActivoId; if(!temaId){ alert('Selecciona un tema'); return; }
        if(fid){ let f=obtenerFuente(fid); if(f){ fuenteEnEdicionId=fid; document.getElementById('modalFuenteTitulo').innerText='✏️ Editar fuente'; document.getElementById('fuenteTitulo').value=f.titulo; document.getElementById('fuenteUrl').value=f.url||''; document.getElementById('fuenteFecha').value=f.fecha_consulta||''; document.getElementById('fuenteTipo').value=f.tipo||''; document.getElementById('fuenteAutores').value=f.autores||''; } }
        else{ fuenteEnEdicionId=null; document.getElementById('modalFuenteTitulo').innerText='➕ Nueva fuente'; document.getElementById('fuenteTitulo').value=''; document.getElementById('fuenteUrl').value=''; document.getElementById('fuenteFecha').value=''; document.getElementById('fuenteTipo').value=''; document.getElementById('fuenteAutores').value=''; }
        document.getElementById('modalFuente').style.display='flex';
    }
    function guardarFuenteModal(){
        let temaId=temaActivoId; if(!temaId) return;
        let datos={titulo:document.getElementById('fuenteTitulo').value.trim(), url:document.getElementById('fuenteUrl').value, fechaConsulta:document.getElementById('fuenteFecha').value, tipo:document.getElementById('fuenteTipo').value, autores:document.getElementById('fuenteAutores').value};
        if(!datos.titulo){ alert('Título requerido'); return; }
        guardarFuente(temaId, fuenteEnEdicionId, datos);
        cerrarModalFuente(); renderizarDetalle();
    }
    function cerrarModalFuente(){ document.getElementById('modalFuente').style.display='none'; fuenteEnEdicionId=null; }
    function abrirModalNota(fid, nid){
        if(nid){ let stmt=db.prepare("SELECT * FROM notas WHERE id=?",[nid]); if(stmt.step()){ let n=stmt.getAsObject(); notaEnEdicion={fuenteId:fid, notaId:nid}; document.getElementById('modalNotaTitulo').innerText='✏️ Editar nota'; document.getElementById('notaUbicacion').value=n.ubicacion; document.getElementById('notaTexto').value=n.texto; document.getElementById('notaFecha').value=n.fecha; document.getElementById('notaCategoria').value=n.categoria||''; } stmt.free(); }
        else{ notaEnEdicion=null; document.getElementById('modalNotaTitulo').innerText='➕ Nueva nota'; document.getElementById('notaUbicacion').value=''; document.getElementById('notaTexto').value=''; document.getElementById('notaFecha').value=new Date().toISOString().slice(0,10); document.getElementById('notaCategoria').value=''; }
        window.modalNotaFuenteId=fid;
        document.getElementById('modalNota').style.display='flex';
    }
    function guardarNotaModal(){
        let fid=window.modalNotaFuenteId; if(!fid) return;
        let datos={ubicacion:document.getElementById('notaUbicacion').value.trim(), texto:document.getElementById('notaTexto').value.trim(), fecha:document.getElementById('notaFecha').value, categoria:document.getElementById('notaCategoria').value.trim()};
        if(!datos.texto){ alert('Contenido requerido'); return; }
        guardarNota(fid, notaEnEdicion?.notaId||null, datos);
        cerrarModalNota(); renderizarDetalle();
    }
    function cerrarModalNota(){ document.getElementById('modalNota').style.display='none'; notaEnEdicion=null; }
    function mostrarMatrizFuente(fid){ let f=obtenerFuente(fid); if(!f) return; matrizFuenteActual=f; let notas=listarNotas(fid); let html=`<table class="matriz-tabla"><thead><tr><th>#</th><th>Ubicación</th><th>Categoría</th><th>Nota</th><th>Fecha</th></tr></thead><tbody>`; notas.forEach((n,i)=>{ html+=`<tr><td>${i+1}</td><td>${escapeHtml(n.ubicacion)}</td><td>${escapeHtml(n.categoria||'')}</td><td>${escapeHtml(n.texto)}</td><td>${n.fecha||''}</td></tr>`; }); html+=`</tbody></table>`; document.getElementById('matrizContenido').innerHTML=html; document.getElementById('modalMatriz').style.display='flex'; }
    function exportarMatrizCSV(){ if(!matrizFuenteActual) return; let notas=listarNotas(matrizFuenteActual.id); let csv=[['#','Ubicación','Categoría','Nota','Fecha'].join(',')]; notas.forEach((n,i)=>{ csv.push([i+1, `"${n.ubicacion.replace(/"/g,'""')}"`, `"${(n.categoria||'').replace(/"/g,'""')}"`, `"${n.texto.replace(/"/g,'""')}"`, `"${n.fecha||''}"`].join(',')); }); let blob=new Blob([csv.join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`matriz_${matrizFuenteActual.titulo}.csv`; a.click(); }
    function abrirEditorMarkdown(contenido,nombre){ document.getElementById('editorMarkdown').value=contenido; currentMarkdownFilename=nombre; document.getElementById('modalMarkdown').style.display='flex'; actualizarVistaPrevia(); }
    function actualizarVistaPrevia(){ let md=document.getElementById('editorMarkdown').value; document.getElementById('vistaPreviaMarkdown').innerHTML=marked.parse(md); }
    function descargarMarkdown(){ let blob=new Blob([document.getElementById('editorMarkdown').value],{type:'text/markdown'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=currentMarkdownFilename||'reporte.md'; a.click(); }
    function copiarMarkdown(){ navigator.clipboard.writeText(document.getElementById('editorMarkdown').value); alert('Copiado'); }

    // ---------- EXPORTAR / IMPORTAR DB ----------
    function exportarDB(){ let data=db.export(); let blob=new Blob([data],{type:'application/octet-stream'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`investigacion_${new Date().toISOString().slice(0,19)}.db`; a.click(); }
    function importarDBReemplazar(file){ if(!confirm('Reemplazar todos los datos?')) return; let reader=new FileReader(); reader.onload=e=>{ let arr=new Uint8Array(e.target.result); if(db) db.close(); db=new SQL.Database(arr); renderizarTemas(); if(listarTemas().length) seleccionarTema(listarTemas()[0].id); else renderizarDetalle(); alert('Reemplazado'); }; reader.readAsArrayBuffer(file); }
    function importarDBCombinar(file){ let reader=new FileReader(); reader.onload=e=>{ let arr=new Uint8Array(e.target.result); let newDb=new SQL.Database(arr); let tablas=['temas','fuentes','notas']; for(let t of tablas){ let stmt=newDb.prepare(`SELECT * FROM ${t}`); let cols=stmt.getColumnNames(); let ins=db.prepare(`INSERT OR IGNORE INTO ${t} (${cols.join(',')}) VALUES (${cols.map(()=>'?').join(',')})`); while(stmt.step()) ins.run(stmt.get()); ins.free(); stmt.free(); } newDb.close(); renderizarTemas(); if(listarTemas().length) seleccionarTema(listarTemas()[0].id); else renderizarDetalle(); alert('Combinado'); }; reader.readAsArrayBuffer(file); }
    function guardarEnDrive(){ if(!CLIENT_ID || CLIENT_ID==='TU_CLIENT_ID_AQUI'){ alert('Configura tu Client ID de Google en el código'); return; } if(!tokenClient){ tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID, scope:'https://www.googleapis.com/auth/drive.file', callback:tr=>{ accessToken=tr.access_token; subirDB(); } }); } if(!accessToken) tokenClient.requestAccessToken({prompt:'consent'}); else subirDB(); }
    function subirDB(){ let blob=new Blob([db.export()],{type:'application/octet-stream'}); let metadata={name:`investigacion_${new Date().toISOString().slice(0,19)}.db`, mimeType:'application/octet-stream'}; let form=new FormData(); form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'})); form.append('file',blob); fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+accessToken},body:form}).then(r=>r.json()).then(d=>{ if(d.id) alert('✅ Guardado en Drive'); else alert('Error'); }).catch(e=>alert('Error conexión')); }

    // ---------- BÚSQUEDA ----------
    function buscarGlobal(t){ if(!t.trim()) return; let term=`%${t.toLowerCase()}%`; let temasRes=db.exec("SELECT id,nombre FROM temas WHERE LOWER(nombre) LIKE ?",[term]); let fuentesRes=db.exec("SELECT f.id,f.titulo,f.autores,t.id as tema_id,t.nombre as tema_nombre FROM fuentes f JOIN temas t ON f.tema_id=t.id WHERE LOWER(f.titulo) LIKE ? OR LOWER(f.autores) LIKE ?",[term,term]); let notasRes=db.exec("SELECT n.id,n.texto,n.ubicacion,f.id as fuente_id,f.titulo as fuente_titulo,t.id as tema_id,t.nombre as tema_nombre FROM notas n JOIN fuentes f ON n.fuente_id=f.id JOIN temas t ON f.tema_id=t.id WHERE LOWER(n.texto) LIKE ? OR LOWER(n.ubicacion) LIKE ?",[term,term]); let res=[]; if(temasRes.length) temasRes[0].values.forEach(r=>res.push({tipo:'tema',temaId:r[0],temaNombre:r[1],texto:`Tema: ${r[1]}`})); if(fuentesRes.length) fuentesRes[0].values.forEach(r=>res.push({tipo:'fuente',temaId:r[3],temaNombre:r[4],fuenteId:r[0],texto:`Fuente: ${r[1]}`})); if(notasRes.length) notasRes[0].values.forEach(r=>res.push({tipo:'nota',temaId:r[5],temaNombre:r[6],fuenteId:r[3],notaId:r[0],texto:`Nota: ${r[1].substring(0,100)}`,ubicacion:r[2]})); let cont=document.getElementById('resultadosLista'); cont.innerHTML=''; if(!res.length) cont.innerHTML='<p>No encontrado</p>'; else res.forEach(r=>{ let div=document.createElement('div'); div.className='resultado-item'; div.innerHTML=`<strong>📁 ${escapeHtml(r.temaNombre)}</strong><br>${r.tipo==='tema'?r.texto:r.tipo==='fuente'?r.texto:`📌 ${r.texto}<br><span class="badge">📍 ${r.ubicacion||''}</span>`}`; div.onclick=()=>{ seleccionarTema(r.temaId); document.getElementById('modalResultados').style.display='none'; if(r.tipo!=='tema') setTimeout(()=>{ let el=document.querySelector(`[data-editar-fuente="${r.fuenteId}"]`)?.closest('div[style*="background:#fefaf5"]'); if(el) el.scrollIntoView({behavior:'smooth'}); },100); }; cont.appendChild(div); }); document.getElementById('modalResultados').style.display='flex'; }

    // ---------- INICIALIZACIÓN ----------
    window.addEventListener('DOMContentLoaded',async()=>{
        await initDB();
        if(listarTemas().length===0){
            let id=crearTema("Inteligencia Artificial");
            let fid=guardarFuente(id,null,{titulo:"Deep Learning Book", url:"https://deeplearningbook.org/", fechaConsulta:"2016", tipo:"Libro", autores:"Goodfellow, I."});
            guardarNota(fid,null,{ubicacion:"Cap.1, p.12", texto:"Definición de aprendizaje profundo", fecha:"2025-03-10", categoria:"Hallazgo"});
            let id2=crearTema("Cambio Climático");
            let fid2=guardarFuente(id2,null,{titulo:"IPCC AR6", url:"https://ipcc.ch/", fechaConsulta:"2021", tipo:"Reporte", autores:"IPCC"});
            guardarNota(fid2,null,{ubicacion:"Resumen p.45", texto:"Aumento 1.1°C", fecha:"2025-03-02", categoria:"Dato"});
        }
        renderizarTemas();
        if(listarTemas().length) seleccionarTema(listarTemas()[0].id);
        else renderizarDetalle();

        document.getElementById('btnCrearTema').onclick=()=>{ let n=document.getElementById('nuevoTemaNombre').value; if(crearTema(n)){ document.getElementById('nuevoTemaNombre').value=''; renderizarTemas(); if(listarTemas().length) seleccionarTema(listarTemas()[listarTemas().length-1].id); } };
        document.getElementById('btnExportarDB').onclick=exportarDB;
        document.getElementById('btnGuardarDrive').onclick=guardarEnDrive;
        document.getElementById('btnImportarReemplazar').onclick=()=>document.getElementById('importDBReemplazar').click();
        document.getElementById('btnImportarCombinar').onclick=()=>document.getElementById('importDBCombinar').click();
        document.getElementById('importDBReemplazar').onchange=e=>{ if(e.target.files.length) importarDBReemplazar(e.target.files[0]); e.target.value=''; };
        document.getElementById('importDBCombinar').onchange=e=>{ if(e.target.files.length) importarDBCombinar(e.target.files[0]); e.target.value=''; };
        document.getElementById('btnGenerarPDFGlobal').onclick=()=>alert('PDF global (funcionalidad completa omitida)');
        document.getElementById('btnMarkdownGlobal').onclick=()=>{ let md=''; let ts=listarTemas(); for(let t of ts) md+=generarMarkdownTema(t.id); abrirEditorMarkdown(md,'reporte_global.md'); };
        document.getElementById('btnGuardarFuente').onclick=guardarFuenteModal;
        document.getElementById('btnCancelarFuente').onclick=cerrarModalFuente;
        document.getElementById('btnGuardarNota').onclick=guardarNotaModal;
        document.getElementById('btnCancelarNota').onclick=cerrarModalNota;
        document.getElementById('btnBuscar').onclick=()=>buscarGlobal(document.getElementById('buscarInput').value);
        document.getElementById('btnLimpiarBusqueda').onclick=()=>document.getElementById('buscarInput').value='';
        document.getElementById('btnCerrarResultados').onclick=()=>document.getElementById('modalResultados').style.display='none';
        document.getElementById('btnCerrarMatriz').onclick=()=>document.getElementById('modalMatriz').style.display='none';
        document.getElementById('btnExportarMatrizCSV').onclick=exportarMatrizCSV;
        document.getElementById('btnCopiarMarkdown').onclick=copiarMarkdown;
        document.getElementById('btnDescargarMarkdown').onclick=descargarMarkdown;
        document.getElementById('btnCerrarMarkdown').onclick=()=>document.getElementById('modalMarkdown').style.display='none';
        document.getElementById('editorMarkdown').addEventListener('input',actualizarVistaPrevia);
        window.onclick=e=>{ if(e.target===document.getElementById('modalResultados')) document.getElementById('modalResultados').style.display='none'; if(e.target===document.getElementById('modalFuente')) cerrarModalFuente(); if(e.target===document.getElementById('modalNota')) cerrarModalNota(); if(e.target===document.getElementById('modalMatriz')) document.getElementById('modalMatriz').style.display='none'; if(e.target===document.getElementById('modalMarkdown')) document.getElementById('modalMarkdown').style.display='none'; };
    });
</script>
</body>
